server.port=8081
server.servlet.context-path=/civicDesk
spring.application.name=auth-service

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Sur@6904
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT
app.jwt.secret=4a6250655368566d5970337336763979244226452948404d6351665468819ad2
app.jwt.expiry=1800000

# Swagger / OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.use-root-path=true

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# Seed admin (created on first startup if not present)
app.admin.email=${ADMIN_EMAIL:admin@civicdesk.gov}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.name=${ADMIN_NAME:CivicDesk Admin}
app.admin.phone=${ADMIN_PHONE:9000000001}

# Info endpoint metadata
info.app.name=${spring.application.name:auth-service}
info.app.description=CivicDesk Authentication and Authorization Service
info.app.version=1.0.0
info.app.build=${project.version:1.0.0}

# Logging
logging.level.com.civicdesk=DEBUG
logging.level.org.springframework.security=INFO

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
