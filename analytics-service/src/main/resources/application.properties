server.port=8088
spring.application.name=analytics-service

spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk_analytics?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Must match auth-service secret
app.jwt.secret=civicdesk_hs256_secret_key_minimum_32_characters_required

# Service URLs for inter-service calls
app.auth-service.url=http://localhost:8081/civicDesk
app.grievance-service.url=http://localhost:8085/civicDesk
app.permit-service.url=http://localhost:8082/civicDesk
app.service-request-service.url=http://localhost:8083/civicDesk
app.work-order-service.url=http://localhost:8084/civicDesk

springdoc.api-docs.path=/civicDesk/api-docs
springdoc.swagger-ui.path=/civicDesk/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging configuration
logging.level.com.civicdesk.analytics=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.config=classpath:logback-spring.xml

