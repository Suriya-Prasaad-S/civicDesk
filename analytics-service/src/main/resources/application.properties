server.port=8088
server.servlet.context-path=/civicDesk
spring.application.name=analytics-service

spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk_analytics?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Must match auth-service secret
app.jwt.secret=4a6250655368566d5970337336763979244226452948404d6351665468819ad2

# Service URLs for inter-service calls
# auth.service.url=http://auth-service

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging configuration
logging.level.com.civicdesk.analytics=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.config=classpath:logback-spring.xml

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

info.app.name=Analytics Service
info.app.version=1.0.0
info.app.description=Analytics and Reporting Service

