server.port=8082
spring.application.name=citizen-service
server.servlet.context-path=/civicDesk

# MySQL — separate DB per microservice
spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk_citizen?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Preserve explicit @Column names as-is (camelCase), matching IAM/grievance/auth.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT — must match auth-service secret
app.jwt.secret=4a6250655368566d5970337336763979244226452948404d6351665468819ad2

# Internal service-to-service key (must match auth-service)
app.internal.api-key=${INTERNAL_API_KEY:civicdesk-internal-9f3a2c7b64e14d08}

# Internal service token for notification-service (must match its app.service.token)
app.service.token=${SERVICE_TOKEN:service-request-internal-token}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.civicdesk=DEBUG
logging.level.org.springframework.security=INFO
logging.config=classpath:logback-spring.xml

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
