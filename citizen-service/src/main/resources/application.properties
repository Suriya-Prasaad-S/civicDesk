server.port=8082
spring.application.name=citizen-service

# MySQL — separate DB per microservice
spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk_citizen?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT — must match auth-service secret
app.jwt.secret=civicdesk_hs256_secret_key_minimum_32_characters_required

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.civicdesk=DEBUG
logging.level.org.springframework.security=INFO
logging.config=classpath:logback-spring.xml
