version: '3.8'

services:

  # ─── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: civicdesk-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - civicdesk-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Eureka Server (8761) ───────────────────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: civicdesk-eureka
    ports:
      - "8761:8761"
    networks:
      - civicdesk-network

  # ─── API Gateway (9090) ─────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: civicdesk-gateway
    ports:
      - "9090:9090"
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      citizen-service:
        condition: service_started
      service-request-service:
        condition: service_started
      permit-service:
        condition: service_started
      grievance-service:
        condition: service_started
      public-works-service:
        condition: service_started
      notification-service:
        condition: service_started
      analytics-service:
        condition: service_started
    networks:
      - civicdesk-network

  # ─── Auth Service (8081) ────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: civicdesk-auth
    ports:
      - "8081:8081"
    environment:
      spring.datasource.url: jdbc:mysql://mysql:3306/civicdesk_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      spring.datasource.username: root
      spring.datasource.password: root
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - civicdesk-network

  # ─── Citizen Service (8082) ─────────────────────────────────────────────────
  citizen-service:
    build: ./citizen-service
    container_name: civicdesk-citizen
    ports:
      - "8082:8082"
    environment:
      spring.datasource.url: jdbc:mysql://mysql:3306/civicdesk_citizen?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      spring.datasource.username: root
      spring.datasource.password: root
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - civicdesk-network

  # ─── Service Request Service (8083) ─────────────────────────────────────────
  service-request-service:
    build: ./service-request-service
    container_name: civicdesk-service-request
    ports:
      - "8083:8083"
    environment:
      spring.datasource.url: jdbc:mysql://mysql:3306/civicdesk_service_request?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      spring.datasource.username: root
      spring.datasource.password: root
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - civicdesk-network

  # ─── Permit Service (8084) ──────────────────────────────────────────────────
  permit-service:
    build: ./permit-service
    container_name: civicdesk-permit
    ports:
      - "8084:8084"
    environment:
      spring.datasource.url: jdbc:mysql://mysql:3306/civicdesk_permit?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      spring.datasource.username: root
      spring.datasource.password: root
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - civicdesk-network

  # ─── Grievance Service (8085) ────────────────────────────────────────────────
  grievance-service:
