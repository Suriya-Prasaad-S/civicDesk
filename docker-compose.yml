      spring.datasource.username: root
      spring.datasource.password: root
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - civicdesk-network

  # ─── Public Works Service (8086) ─────────────────────────────────────────────
