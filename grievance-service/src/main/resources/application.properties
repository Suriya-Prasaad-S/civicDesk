server.port=8085
server.servlet.context-path=/civicDesk
spring.application.name=grievance-service

spring.profiles.active=dev

spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk_grievance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=4a6250655368566d5970337336763979244226452948404d6351665468819ad2

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

logging.config=classpath:logback-spring.xml

# ── Logging ──────────────────────────────────────────────────────────────────
# Where log files are written (used by logback-spring.xml). Default lands inside this module's
# folder when the service is started from the repo root; override per-environment via GRIEVANCE_LOG_PATH.
app.log.path=${GRIEVANCE_LOG_PATH:civicDesk/grievance-service/logs}

# Per-package log levels
logging.level.root=INFO
logging.level.com.civicdesk.grievance=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

auth.service.url=http://localhost:8081/civicDesk

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

info.app.name=Grievance Service
info.app.version=1.0.0
info.app.description=Grievance Management

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

