server.port=8085
server.servlet.context-path=/civicDesk
spring.application.name=grievance-service

spring.profiles.active=dev

spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk_grievance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=civicdesk_hs256_secret_key_minimum_32_characters_required

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

logging.config=classpath:logback-spring.xml

auth.service.url=http://localhost:8081/civicDesk

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

