server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk_public_works?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=civicdesk_hs256_secret_key_minimum_32_characters_required

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

logging.config=classpath:logback-spring.xml
app.notification-service.url=http://localhost:8087
app.gateway.url=http://localhost:9090

